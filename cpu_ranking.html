let filtered = RAW.map(function(d,i){ return {r:parseInt(d.pai_ming), n:d.ming_cheng, s:parseInt(d.shu_zhi), p:parseFloat(d.bai_fen_bi), idx:i}; });
let sortKey = 'r';
let sortAsc = true;
let page = 1;
const PS = 50;

function getBrand(n) {
    n = n.toLowerCase();
    if (n.includes('intel')) return 'Intel';
    if (n.includes('amd')) return 'AMD';
    return 'Other';
}

function doFilter() {
    const q = document.getElementById('search').value.toLowerCase();
    const b = document.getElementById('brand').value;
    filtered = RAW.map(function(d,i){ return {r:parseInt(d.pai_ming), n:d.ming_cheng, s:parseInt(d.shu_zhi), p:parseFloat(d.bai_fen_bi), idx:i}; })
        .filter(function(d) {
            if (b === 'Intel' && getBrand(d.n) !== 'Intel') return false;
            if (b === 'AMD' && getBrand(d.n) !== 'AMD') return false;
            if (b === 'Other' && getBrand(d.n) !== 'Other') return false;
            if (q && !d.n.toLowerCase().includes(q)) return false;
            return true;
        });
    document.getElementById('count').textContent = filtered.length.toLocaleString() + ' 条';
    document.getElementById('arrow-rank').textContent = '▲';
    document.getElementById('arrow-name').textContent = '';
    document.getElementById('arrow-score').textContent = '';
    sortKey = 'r';
    sortAsc = true;
    page = 1;
    filtered.sort(function(a,b){ return a.r - b.r; });
    render();
}

function doSort(key) {
    if (sortKey === key) sortAsc = !sortAsc;
    sortKey = key;
    filtered.sort(function(a, b) {
        var va = a[key], vb = b[key];
        if (key === 'n') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        return sortAsc ? va - vb : vb - va;
    });
    document.getElementById('arrow-rank').textContent = sortKey==='r' ? (sortAsc?'▲':'▼') : '';
    document.getElementById('arrow-name').textContent = sortKey==='n' ? (sortAsc?'▲':'▼') : '';
    document.getElementById('arrow-score').textContent = sortKey==='s' ? (sortAsc?'▲':'▼') : '';
    page = 1;
    render();
}

function render() {
    var total = Math.ceil(filtered.length / PS) || 1;
    if (page > total) page = total;
    var slice = filtered.slice((page-1)*PS, page*PS);
    var html = '';
    for (var i = 0; i < slice.length; i++) {
        var d = slice[i];
        var b = getBrand(d.n);
        var bc = b === 'Intel' ? 'intel' : (b === 'AMD' ? 'amd' : 'other');
        var bw = Math.min(d.p, 100);
        html += '<tr><td>' + d.r + '</td><td>' + d.n + '<span class="bar ' + bc + '" style="width:' + bw + 'px"></span></td><td>' + d.s.toLocaleString() + '</td><td>' + d.p.toFixed(2) + '%</td></tr>';
    }
    document.getElementById('tbody').innerHTML = html;
    
    var h = '';
    h += '<button onclick="goPage(1)"' + (page===1?' disabled':'') + '>首页</button>';
    h += '<button onclick="goPage(' + (page-1) + ')"' + (page===1?' disabled':'') + '>上一页</button>';
    for (var i = Math.max(1,page-3); i <= Math.min(total,page+3); i++)
        h += '<button class="' + (i===page?'active':'') + '" onclick="goPage(' + i + ')">' + i + '</button>';
    h += '<button onclick="goPage(' + (page+1) + ')"' + (page===total?' disabled':'') + '>下一页</button>';
    h += '<button onclick="goPage(' + total + ')"' + (page===total?' disabled':'') + '>末页</button>';
    h += '<span style="font-size:13px;color:#888;margin-left:8px">' + page + ' / ' + total + ' 页</span>';
    document.getElementById('pager').innerHTML = h;
}

function goPage(p) {
    var total = Math.ceil(filtered.length / PS) || 1;
    if (p < 1 || p > total) return;
    page = p;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 初始：强制按排名数字升序
filtered.sort(function(a,b){ return a.r - b.r; });
document.getElementById('count').textContent = filtered.length.toLocaleString() + ' 条';
render();
</script>
